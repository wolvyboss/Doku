<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOKU — Choisissez votre thème</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
--bg:#f7f8fa;--surface:#ffffff;--surface2:#f0f2f5;
--border:#e4e7ec;--border2:#d0d5dd;
--green:#2d8c4e;--green-dim:#e8f5ed;
--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;
--gold:#d97706;--r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
header{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 18px;border-bottom:1px solid var(--border);}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;text-transform:uppercase;letter-spacing:-.5px;}
.logo span{color:var(--green)}
.header-right{display:flex;align-items:center;gap:12px;}
.streak-pill{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:600;color:var(--gold);}
.date-lbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.hero{text-align:center;padding:52px 24px 40px;}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(36px,8vw,64px);text-transform:uppercase;letter-spacing:-2px;line-height:1;margin-bottom:14px;}
.hero-title span{color:var(--green)}
.hero-sub{font-size:clamp(14px,3vw,17px);color:var(--text2);max-width:400px;margin:0 auto;line-height:1.5;}
.daily-badge{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--text2);margin-top:18px;}
.daily-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0;}
.themes-section{flex:1;max-width:680px;width:100%;margin:0 auto;padding:0 16px 60px;}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;}
.themes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.theme-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 20px;cursor:pointer;transition:all .18s ease;text-decoration:none;display:block;position:relative;overflow:hidden;}
.theme-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-color,#b5ff4d) 0%,transparent 60%);opacity:0;transition:opacity .18s;}
.theme-card:hover{border-color:var(--accent-color,var(--green));transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.08);}
.theme-card:hover::before{opacity:.04}
.theme-card.soon{opacity:.5;cursor:not-allowed;pointer-events:none;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.card-emoji{font-size:32px;line-height:1;}
.card-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:3px 8px;border-radius:6px;border:1px solid;}
.card-badge.live{color:var(--green);border-color:var(--green);background:rgba(45,140,78,.08);}
.card-badge.soon-badge{color:var(--text3);border-color:var(--border2);}
.card-badge.new{color:var(--gold);border-color:rgba(255,201,77,.3);background:rgba(217,119,6,.08);}
.card-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;text-transform:uppercase;letter-spacing:-.5px;color:var(--text);margin-bottom:5px;}
.card-desc{font-size:13px;color:var(--text2);line-height:1.4;}
.card-meta{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-categories{display:flex;gap:5px;flex-wrap:wrap;}
.cat-chip{font-size:10px;font-weight:600;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:2px 6px;color:var(--text2);}
.card-arrow{font-size:18px;color:var(--text3);transition:color .15s,transform .15s;}
.theme-card:hover .card-arrow{color:var(--green);transform:translateX(3px);}
.stats-row{max-width:680px;width:100%;margin:0 auto 28px;padding:0 16px;display:flex;gap:10px;}
.stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center;}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:var(--green);letter-spacing:-1px;line-height:1;}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;font-weight:500}
footer{border-top:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.footer-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;text-transform:uppercase;color:var(--text3);}
.footer-logo span{color:var(--green)}
.footer-links{display:flex;gap:16px}
.footer-link{font-size:12px;color:var(--text3);text-decoration:none;transition:color .15s}
.footer-link:hover{color:var(--text2)}
@media(max-width:480px){
header{padding:16px}
.hero{padding:36px 16px 28px}
.stats-row{gap:8px}
.stat-box{padding:12px}
.stat-num{font-size:24px}
.themes-grid{grid-template-columns:1fr}
footer{padding:16px}
}
</style>
</head>
<body>

<header>
  <div class="logo">DO<span>KU</span></div>
  <div class="header-right">
    <div class="date-lbl" id="dateLbl"></div>
    <div class="streak-pill">🔥 <span id="streakTotal">0</span></div>
  </div>
</header>

<div class="hero">
  <div class="hero-title">Choisissez<br>votre <span>thème</span></div>
  <div class="hero-sub">Une nouvelle grille chaque jour.<br>Trouvez les bonnes réponses avant d'épuiser vos 3 essais.</div>
  <div class="daily-badge">
    <div class="dot"></div>
    Grille du jour disponible
  </div>
</div>

<div class="stats-row">
  <div class="stat-box">
    <div class="stat-num" id="statParties">0</div>
    <div class="stat-lbl">Parties jouées</div>
  </div>
  <div class="stat-box">
    <div class="stat-num" id="statStreak">0</div>
    <div class="stat-lbl">Série actuelle 🔥</div>
  </div>
  <div class="stat-box">
    <div class="stat-num" id="statScore">0</div>
    <div class="stat-lbl">Meilleur score</div>
  </div>
</div>

<div class="themes-section">
  <div class="section-title">Thèmes disponibles</div>
  <div class="themes-grid" id="themesGrid"><div style="color:var(--text2);padding:20px 0;font-size:13px">Chargement...</div></div>
</div>

<footer>
  <div class="footer-logo">DO<span>KU</span></div>
  <div class="footer-links">
    <a href="#" class="footer-link">A propos</a>
    <a href="#" class="footer-link">Contact</a>
  </div>
</footer>

<script>
document.getElementById('dateLbl').textContent =
  new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

async function loadThemes(){
  try {
    const themes = await fetch('data/themes.json').then(r=>r.json());
    const grid = document.getElementById('themesGrid');
    grid.innerHTML = themes.filter(t=>t.active!==false).map(t=>{
      const badge = t.premium
        ? '<div class="card-badge soon-badge">Premium</div>'
        : '<div class="card-badge live">● En ligne</div>';
      const chips = (t.chips||[]).map(c=>`<span class="cat-chip">${c}</span>`).join('');
      return `<a class="theme-card" href="jeu.html?theme=${t.id}" style="--accent-color:${t.color||'#2d8c4e'}">
        <div class="card-top"><div class="card-emoji">${t.icon}</div>${badge}</div>
        <div class="card-title">${t.label}</div>
        <div class="card-desc">${t.description}</div>
        <div class="card-meta"><div class="card-categories">${chips}</div><div class="card-arrow">→</div></div>
      </a>`;
    }).join('');

    // Stats
    let parties=0, score=0, streak=0;
    themes.forEach(t=>{
      const arch = JSON.parse(localStorage.getItem('fg_arch_'+t.id)||'[]');
      parties += arch.length;
      arch.forEach(a=>{ if(a.score>score) score=a.score; });
      const s = parseInt(localStorage.getItem('fg_s_'+t.id))||0;
      if(s>streak) streak=s;
    });
    document.getElementById('statParties').textContent = parties;
    document.getElementById('statStreak').textContent = streak;
    document.getElementById('statScore').textContent = score;
    document.getElementById('streakTotal').textContent = streak;
  } catch(e){ console.error('Erreur themes.json',e); }
}
loadThemes();
</script>
</body>
</html>
